{% extends 'pay_end/base_pay.html' %}
{% block title %}Add Course{% endblock title %}
{% block content %}
    <h1 class="mt-4">Add Course</h1>
    {% if submitted %}
        <p>You have added a course!</p>
        <a href="{% url 'add-course' %}" class="btn btn-primary">Add another course</a>
    {% else %}
        <form action="" method="post" class="mt-3">
            {% csrf_token %}
            {% include 'pay_end/_course_fields.html' %}
            <input type="submit" value="Add course" class="btn btn-secondary mb-4">
        </form>
    {% endif %}
{% endblock %}
