{% extends 'pay_end/base_pay.html' %}
{% block title %}Add Activity{% endblock title %}
{% block content %}
    <h1 class="mt-4">Add Activity</h1>
    {% if submitted %}
        <p>You have added an activity!</p>
        <a href="{% url 'add-course' %}" class="btn btn-primary">Add Another Activity</a>
    {% else %}
        <form action="" method="post" class="mt-3">
            {% csrf_token %}
            {% include 'pay_end/_course_fields.html' %}
            <input type="submit" value="Add Activity" class="btn btn-secondary mb-4">
        </form>
    {% endif %}
{% endblock %}
