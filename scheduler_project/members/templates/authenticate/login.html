{% extends 'sched_app_template/base.html' %}
{% block title %}Log In | FlowLine{% endblock title %}
{% block content %}
  <div class="row justify-content-center py-5">
    <div class="col-md-8 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h3 mb-2">Log In</h1>
          <p class="text-muted mb-4">Access the operational dashboard to prepare and review schedules.</p>
          <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input id="username" type="text" class="form-control" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input id="password" type="password" class="form-control" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Log In</button>
          </form>
          <p class="text-muted small mt-3 mb-0">Need an account? <a href="{% url 'register_user' %}">Create Account</a></p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
